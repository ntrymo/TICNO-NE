<script src="script.js"></script>
<script>
// News data
const news = [
    {
        id: 1,
        title: 'إطلاق متجر LAKHAL STOR الجديد',
        description: 'يسعدنا الإعلان عن إطلاق متجرنا الرقمي الجديد المتخصص في بيع الحسابات الرقمية والمنتجات الافتراضية.',
        date: '2024-04-01',
        type: 'إعلان',
        emoji: '🎉'
    },

    {
        id: 2,
        title: 'خصم خاص على جميع المنتجات',
        description: 'احتفل معنا بإطلاق المتجر بعرض خاص يشمل خصم 15% على جميع المنتجات لمدة أسبوع كامل.',
        date: '2024-03-30',
        type: 'عرض',
        emoji: '💰'
    },
    {
        id: 3,
        title: 'إضافة خدمة الدعم الفوري',
        description: 'أصبح بإمكانك الآن التواصل معنا عبر الواتساب للحصول على دعم فوري ومساعدة سريعة.',
        date: '2024-03-25',
        type: 'تحديث',
        emoji: '⚡'
    },
    {
        id: 4,
        title: 'شراكة جديدة مع مزودي الخدمات',
        description: 'تعاوننا مع أفضل المزودين لضمان جودة المنتجات وأمان المعاملات.',
        date: '2024-03-20',
        type: 'شراكة',
        emoji: '🤝'
    }
];

// Display news
function displayNews() {
    const container = document.getElementById('newsContainer');
    container.innerHTML = news.map(item => `
        <div class="news-card">
            <div class="news-header">
                <span class="news-emoji">${item.emoji}</span>
                <span class="news-type">${item.type}</span>
            </div>
            <h3 class="news-title">${item.title}</h3>
            <p class="news-description">${item.description}</p>
            <div class="news-date">${item.date}</div>
        </div>
    `).join('');
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
    displayNews();
    initSplashScreen();
    setupFloatingActionMenu();
});
</script>
